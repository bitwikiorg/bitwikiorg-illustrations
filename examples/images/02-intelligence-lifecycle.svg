<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Lifecycle of Intelligence</title><desc id="desc">Six-stage loop from task entry in BIThub through workcell processing, artifact creation, BITwiki codification, and future reuse.</desc>
<defs><pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#777" opacity=".16"/></pattern><linearGradient id="s"><stop stop-color="#7b2cff"/><stop offset=".3" stop-color="#1478ff"/><stop offset=".55" stop-color="#00cfa7"/><stop offset=".78" stop-color="#ffd84d"/><stop offset="1" stop-color="#ff3b76"/></linearGradient><style>.p{fill:#eee9df}.i{stroke:#171717;fill:none;stroke-width:4}.t{stroke:#444;fill:none;stroke-width:2}.b{fill:#f7f3eb;stroke:#171717;stroke-width:3}.x{font-family:Arial,sans-serif;fill:#111}.h{font-size:52px;font-weight:700}.n{font-size:22px;font-weight:700}.m{font-size:17px}.a{stroke:url(#s);stroke-width:14;fill:none}</style></defs>
<rect width="1600" height="900" class="p"/><rect width="1600" height="900" fill="url(#g)"/><rect x="25" y="25" width="1550" height="850" class="t"/>
<text x="70" y="95" class="x h">The Lifecycle of Intelligence</text><text x="70" y="135" class="x" font-size="25">Useful intelligence compounds through capture, processing, codification, and reuse.</text>
<path d="M140 430H1460" class="a"/><path d="M1460 430Q1515 430 1515 510V700Q1515 760 1450 760H150Q85 760 85 700V510Q85 430 140 430" class="a" opacity=".75"/>
<g transform="translate(80 260)"><circle cx="110" cy="170" r="92" class="b"/><path d="M60 135h100v65H95l-25 25 8-25H60z" class="i"/><circle cx="90" cy="168" r="5"/><circle cx="110" cy="168" r="5"/><circle cx="130" cy="168" r="5"/><text x="110" y="300" text-anchor="middle" class="x n">1. Task enters BIThub</text><text x="110" y="330" text-anchor="middle" class="x m">Question, idea, or problem captured.</text></g>
<g transform="translate(330 260)"><circle cx="110" cy="170" r="92" class="b"/><path d="M55 125l55-30 55 30v90l-55 30-55-30zM55 125l55 32 55-32M110 157v88" class="i"/><text x="110" y="300" text-anchor="middle" class="x n">2. Topic becomes a workcell</text><text x="110" y="330" text-anchor="middle" class="x m">Scope, context, tools, collaborators.</text></g>
<g transform="translate(580 260)"><circle cx="110" cy="170" r="92" class="b"/><circle cx="110" cy="170" r="26" class="i"/><circle cx="62" cy="130" r="18" class="i"/><circle cx="158" cy="130" r="18" class="i"/><circle cx="110" cy="225" r="18" class="i"/><path d="M78 143l20 15M142 143l-20 15M110 196v11" class="i"/><text x="110" y="300" text-anchor="middle" class="x n">3. Process the task</text><text x="110" y="330" text-anchor="middle" class="x m">Agents, Constructs, and COREs.</text></g>
<g transform="translate(830 260)"><circle cx="110" cy="170" r="92" class="b"/><path d="M60 112h100v116H60zM80 92h60v30H80zM78 150h64M78 178h64M78 206h44" class="i"/><text x="110" y="300" text-anchor="middle" class="x n">4. Output becomes an Artifact</text><text x="110" y="330" text-anchor="middle" class="x m">Validated, structured, versioned.</text></g>
<g transform="translate(1080 260)"><circle cx="110" cy="170" r="92" class="b"/><path d="M55 120q55-28 110 0v105q-55-28-110 0zM110 105v105" class="i"/><path d="M73 145q18-10 28-2M119 143q18-10 28 2" class="t"/><text x="110" y="300" text-anchor="middle" class="x n">5. Move into BITwiki</text><text x="110" y="330" text-anchor="middle" class="x m">Stable knowledge is codified.</text></g>
<g transform="translate(1330 260)"><circle cx="110" cy="170" r="92" class="b"/><circle cx="82" cy="155" r="22" class="i"/><circle cx="138" cy="155" r="22" class="i"/><path d="M48 220q34-55 68 0M104 220q34-55 68 0" class="i"/><text x="110" y="300" text-anchor="middle" class="x n">6. Reuse and extend</text><text x="110" y="330" text-anchor="middle" class="x m">Future humans and agents compound it.</text></g>
<text x="800" y="825" text-anchor="middle" class="x n">Each completed cycle becomes context for the next.</text>
</svg>