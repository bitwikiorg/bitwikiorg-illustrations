<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">BIThub Workcell</title><desc id="desc">A BIThub topic becomes a bounded workcell where humans and agents collaborate with context, tools, and traceable outputs.</desc>
<defs><pattern id="g" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#666" opacity=".15"/></pattern><linearGradient id="s"><stop stop-color="#7028ff"/><stop offset=".4" stop-color="#008cff"/><stop offset=".7" stop-color="#00d7ad"/><stop offset="1" stop-color="#ff4c8d"/></linearGradient><style>.p{fill:#eee9df}.i{stroke:#151515;fill:none;stroke-width:4}.t{stroke:#454545;fill:none;stroke-width:2}.b{fill:#f8f4ed;stroke:#151515;stroke-width:4}.x{font-family:Arial,sans-serif;fill:#111}.h{font-size:58px;font-weight:700}.n{font-size:24px;font-weight:700}.m{font-size:18px}.a{stroke:url(#s);stroke-width:13;fill:none}</style></defs>
<rect width="1600" height="900" class="p"/><rect width="1600" height="900" fill="url(#g)"/><rect x="25" y="25" width="1550" height="850" class="t"/>
<text x="70" y="100" class="x h">BIThub</text><text x="70" y="145" class="x" font-size="26">Live forum workspace — the front door of the Intelligence Factory</text>
<g transform="translate(470 170)"><path d="M0 170L330 0l330 170v370L330 710 0 540z" class="b"/><path d="M0 170l330 170 330-170M330 340v370" class="i"/><path d="M70 205l260 130 260-130v260L330 600 70 465z" class="t"/><circle cx="330" cy="390" r="115" class="i"/><circle cx="330" cy="390" r="48" fill="#7a2cff" opacity=".75"/><circle cx="205" cy="310" r="24" class="i"/><circle cx="455" cy="310" r="24" class="i"/><circle cx="195" cy="490" r="24" class="i"/><circle cx="465" cy="490" r="24" class="i"/><path d="M225 320l65 45M435 320l-65 45M218 478l72-55M442 478l-72-55" class="a"/><text x="330" y="760" text-anchor="middle" class="x n">Topic as bounded workcell</text></g>
<path d="M120 320H470" class="a"/><path d="M1130 500H1480" class="a"/>
<g transform="translate(70 230)"><rect width="310" height="210" class="b"/><text x="25" y="45" class="x n">Inputs</text><text x="25" y="82" class="x m">Questions · ideas · needs</text><text x="25" y="115" class="x m">Human context · agent context</text><text x="25" y="148" class="x m">Links · files · current state</text><text x="25" y="181" class="x m">Permissions · constraints</text></g>
<g transform="translate(1220 395)"><rect width="310" height="240" class="b"/><text x="25" y="45" class="x n">Routed outputs</text><text x="25" y="82" class="x m">Assignments and decisions</text><text x="25" y="115" class="x m">Agent work and validations</text><text x="25" y="148" class="x m">Artifacts and next actions</text><text x="25" y="181" class="x m">Traceable history and state</text><text x="25" y="214" class="x m">Routes into BITCORE / BITwiki</text></g>
<g transform="translate(80 660)"><text class="x n">Operational rule</text><text y="38" class="x m">Conversation becomes structured execution only when scope, ownership, context, and outputs are explicit.</text></g>
</svg>