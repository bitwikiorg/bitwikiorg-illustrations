<g transform="translate(295 340)"><polygon points="0,-190 56,-80 174,-134 96,-33 190,0 80,56 134,174 33,96 0,190 -56,80 -174,134 -96,33 -190,0 -80,-56 -134,-174 -33,-96" class="i"/><polygon points="0,-130 92,-92 130,0 92,92 0,130 -92,92 -130,0 -92,-92" class="a"/><polygon points="0,-75 53,-53 75,0 53,53 0,75 -53,53 -75,0 -53,-53" class="t"/><circle r="25" fill="#fff" stroke="#7c2cff" stroke-width="8"/></g></g>
<g transform="translate(70 220)"><rect width="310" height="130" class="b"/><text x="22" y="42" class="x n">Recursive reasoning</text><text x="22" y="78" class="x m">Decompose, reflect, compare,</text><text x="22" y="106" class="x m">evaluate, and refine across layers.</text></g>
<g transform="translate(70 385)"><rect width="310" height="130" class="b"/><text x="22" y="42" class="x n">Tool orchestration</text><text x="22" y="78" class="x m">Select and coordinate models,</text><text x="22" y="106" class="x m">tools, APIs, and procedures.</text></g>
<g transform="translate(70 550)"><rect width="310" height="130" class="b"/><text x="22" y="42" class="x n">Memory-aware processing</text><text x="22" y="78" class="x m">Ground work in state, history,</text><text x="22" y="106" class="x m">identity, provenance, and context.</text></g>
<g transform="translate(1220 220)"><rect width="310" height="130" class="b"/><text x="22" y="42" class="x n">Multi-agent coordination</text><text x="22" y="78" class="x m">Assign specialized roles and</text><text x="22" y="106" class="x m">merge parallel work coherently.</text></g>
<g transform="translate(1220 385)"><rect width="310" height="130" class="b"/><text x="22" y="42" class="x n">CORE execution</text><text x="22" y="78" class="x m">Run staged workflows with gates,</text><text x="22" y="106" class="x m">checks, retries, and state changes.</text></g>
<g transform="translate(1220 550)"><rect width="310" height="130" class="b"/><text x="22" y="42" class="x n">Authorized adaptation</text><text x="22" y="78" class="x m">Adjust plans within human-defined</text><text x="22" y="106" class="x m">permissions, constraints, and goals.</text></g>
