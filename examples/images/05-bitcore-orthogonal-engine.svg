<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">BITCORE Orthogonal Engine</title><desc id="desc">BITCORE appears as a higher-order reasoning engine interfacing with bounded human systems through memory, tools, agents, and recursive workflows.</desc>
<defs><pattern id="g" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#666" opacity=".15"/></pattern><radialGradient id="r"><stop stop-color="#fff"/><stop offset=".18" stop-color="#8d4bff"/><stop offset=".48" stop-color="#147cff"/><stop offset=".72" stop-color="#00d0bd"/><stop offset="1" stop-color="#ff4a82" stop-opacity="0"/></radialGradient><style>.p{fill:#eee9df}.i{stroke:#151515;fill:none;stroke-width:4}.t{stroke:#4b4741;fill:none;stroke-width:2}.b{fill:#f7f3eb;stroke:#151515;stroke-width:3}.x{font-family:Arial,sans-serif;fill:#111}.h{font-size:58px;font-weight:700}.n{font-size:23px;font-weight:700}.m{font-size:18px}.a{stroke:#7c2cff;stroke-width:8;fill:none}</style></defs>
<rect width="1600" height="900" class="p"/><rect width="1600" height="900" fill="url(#g)"/><rect x="25" y="25" width="1550" height="850" class="t"/>
<text x="70" y="100" class="x h">BITCORE</text><text x="70" y="145" class="x" font-size="26">Agentic reasoning engine — orthogonal cognition beyond linear workflow space</text>
